components:
  schemas:
    DogDto:
      type: object
      description: Représentation d'un chien dans le système
      properties:
        id:
          type: integer
          format: int64
          description: Identifiant unique du chien
          example: 1
        name:
          type: string
          description: Nom du chien
          example: "Rex"
        race:
          type: string
          description: Race du chien
          example: "Berger Allemand"
      required:
        - name
        - race

    LocationDto:
      type: object
      description: Représentation d'une location de film
      properties:
        id:
          type: integer
          format: int64
          description: Identifiant unique de la location
          example: 1
        pseudo:
          type: string
          description: Pseudo de l'utilisateur qui a loué le film
          example: "john"
        filmId:
          type: integer
          format: int64
          description: Identifiant du film loué
          example: 42
        titreFilm:
          type: string
          description: Titre du film loué
          example: "Inception"
        dateDebut:
          type: string
          format: date
          description: Date de début de la location
          example: "2026-02-25"
        dateFin:
          type: string
          format: date
          nullable: true
          description: Date de fin de la location (null si en cours)
          example: null
        enCours:
          type: boolean
          description: Indique si la location est en cours (dateFin == null)
          example: true

    ErrorResponse:
      type: object
      description: Réponse d'erreur retournée par l'API
      properties:
        error:
          type: string
          description: Message décrivant l'erreur
          example: "Le film 'xxx' n'existe pas"
      tags:
        - reservations
      summary: Terminer la location
      description: Termine la location du film spécifié en mettant la dateFin à aujourd'hui.
      operationId: terminerLocation
      parameters:
        - name: titreFilm
          in: path
          description: Titre du film à rendre
          required: true
          schema:
            type: string
          example: "Inception"
        - name: X-User-Pseudo
          in: header
          description: Pseudo de l'utilisateur connecté
          required: true
          schema:
            type: string
          example: "john"
