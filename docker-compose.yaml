services:

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: monMotDePasseSuperSecret
      MYSQL_DATABASE: mps_db
    volumes:
      - ./data/mariadb:/var/lib/mysql
    ports:
      - "11085:3306"

  gateway:
    image: sanndobtg/vod-gateway:latest
    ports:
      - "11080:8080"   # corrigé
    depends_on:
      - api-user
      - api-reservation
      - api-review

  api-user:
    image: sanndobtg/vod-api-user:latest
    ports:
      - "11081:8082"   # corrigé
    environment:
      SERVER_PORT: 11081
      SPRING_DATASOURCE_URL: jdbc:mysql://mariadb:3306/mps_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: monMotDePasseSuperSecret
    depends_on:
      - mariadb

  api-reservation:
    image: sanndobtg/vod-api-reservation:latest
    ports:
      - "11082:8081"   # corrigé
    environment:
      SERVER_PORT: 11082
      SPRING_DATASOURCE_URL: jdbc:mysql://mariadb:3306/mps_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: monMotDePasseSuperSecret
    depends_on:
      - mariadb

  api-review:
    image: sanndobtg/vod-api-review:latest
    ports:
      - "11083:8083"   # corrigé (probable)
    environment:
      SERVER_PORT: 11083
      MONGODB_URI: mongodb://obiwan.univ-brest.fr:27017
    depends_on:
      - mariadb

  # ──────────────────────────────────────
  #  API POSTER
  # ──────────────────────────────────────
  api-poster:
    image: sanndobtg/vod-api-poster:latest
    ports:
      - "11084:11084"
    environment:
      SERVER_PORT: 11084
      MONGODB_URI: mongodb://obiwan.univ-brest.fr:27017
