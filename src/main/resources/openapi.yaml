            application/json:
              schema:
                $ref: '#/components/schemas/LocationDto'
        '404':
          description: Film, compte ou location en cours non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur serveur interne

