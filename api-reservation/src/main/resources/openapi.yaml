openapi: 3.0.3
info:
  title: API de Gestion de Réservations VOD
  description: |
    API REST permettant la gestion des réservations / locations de films (VOD).
  version: 1.0.0
  contact:
    name: Support API
    email: support@example.com

servers:
  - url: http://localhost:8080
    description: Serveur de développement local

tags:
  - name: reservations
    description: Opérations liées à la location de films (VOD)

paths:
  # ──────────────────────────────────────────
  #  RESERVATIONS
  # ──────────────────────────────────────────
  /reservations/me:
    get:
      tags:
        - reservations
      summary: Films en location
      description: Récupère la liste des films actuellement loués par l'utilisateur connecté (dateFin == null).
      operationId: getFilmsEnLocation
      parameters:
        - name: X-User-Pseudo
          in: header
          description: Pseudo de l'utilisateur connecté
          required: true
          schema:
            type: string
          example: "john"
      responses:
        '200':
          description: Liste des locations en cours récupérée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationDto'
        '404':
          description: Compte non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur serveur interne

  /reservations/{titreFilm}:
    post:
      tags:
        - reservations
      summary: Réserver un film
      description: |
        Crée une location pour le film spécifié.
        Contraintes vérifiées :
        - Le film doit être louable
        - L'utilisateur ne doit pas avoir plus de 3 locations en cours
        - L'âge de l'utilisateur doit être supérieur ou égal à l'âge minimum du film
      operationId: reserverFilm
      parameters:
        - name: titreFilm
          in: path
          description: Titre du film à réserver
          required: true
          schema:
            type: string
          example: "Inception"
        - name: X-User-Pseudo
          in: header
          description: Pseudo de l'utilisateur connecté
          required: true
          schema:
            type: string
          example: "john"
      responses:
        '201':
          description: Réservation effectuée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationDto'
        '403':
          description: Quota de 3 films atteint, âge insuffisant ou film non louable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Film ou compte non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur serveur interne

